<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>排行榜 - 贵人连连看</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px 10px;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      background: rgba(255,255,255,0.95);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }

    .subtitle {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 20px;
    }

    th, td {
      padding: 12px 8px;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    th {
      background: #667eea;
      color: white;
      font-weight: 600;
      position: sticky;
      top: 0;
    }

    th:first-child { border-radius: 8px 0 0 0; }
    th:last-child { border-radius: 0 8px 0 0; }

    tr:nth-child(even) {
      background: #f9f9f9;
    }

    tr:hover {
      background: #f0f4ff;
    }

    .rank-1 { color: #FFD700; font-weight: bold; }
    .rank-2 { color: #C0C0C0; font-weight: bold; }
    .rank-3 { color: #CD7F32; font-weight: bold; }

    .back-btn {
      display: block;
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
    }

    .back-btn:active {
      background: #5a6fd8;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .error {
      text-align: center;
      padding: 20px;
      color: #e74c3c;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🏆 排行榜</h1>
    <div class="subtitle">贵人连连看</div>

    <div id="loading" class="loading">加载中...</div>
    <div id="error" class="error" style="display:none;"></div>

    <table id="leaderboard" style="display:none;">
      <thead>
        <tr>
          <th style="width: 15%">排名</th>
          <th style="width: 45%">昵称</th>
          <th style="width: 20%">分数</th>
          <th style="width: 20%">时间</th>
        </tr>
      </thead>
      <tbody id="leaderboard-body"></tbody>
    </table>

    <a href="javascript:history.back()" class="back-btn">← 返回游戏</a>
  </div>

  <script>
    async function loadLeaderboard() {
      const loadingEl = document.getElementById('loading');
      const errorEl = document.getElementById('error');
      const tableEl = document.getElementById('leaderboard');
      const tbodyEl = document.getElementById('leaderboard-body');

      try {
        const response = fetch('/api/leaderboard');
        const result = await response.json();

        if (!result.success) {
          throw new Error(result.error || '加载失败');
        }

        const data = result.data;

        if (data.length === 0) {
          tbodyEl.innerHTML = '<tr><td colspan="4" style="padding: 30px; color: #999;">暂无排行数据</td></tr>';
        } else {
          tbodyEl.innerHTML = data.map(entry => {
            let rankClass = '';
            if (entry.rank === 1) rankClass = 'rank-1';
            else if (entry.rank === 2) rankClass = 'rank-2';
            else if (entry.rank === 3) rankClass = 'rank-3';

            return `
              <tr>
                <td class="${rankClass}">${entry.rank}</td>
                <td>${escapeHtml(entry.nickname)}</td>
                <td>${entry.score}</td>
                <td style="font-size: 12px; color: #888;">${entry.time}</td>
              </tr>
            `;
          }).join('');
        }

        loadingEl.style.display = 'none';
        tableEl.style.display = 'table';
      } catch (e) {
        console.error('加载排行榜失败:', e);
        loadingEl.style.display = 'none';
        errorEl.textContent = '加载失败：' + e.message;
        errorEl.style.display = 'block';
      }
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // 页面加载时获取数据
    loadLeaderboard();
  </script>
</body>
</html>
